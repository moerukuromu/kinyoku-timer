<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>禁欲タイマーカレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="禁欲タイマー">
<meta name="theme-color" content="#2E7A56">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="apple-touch-icon.png?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2">
<style>
  :root {
    --ground: #F6F7F3;
    --surface: #FFFFFF;
    --ink: #1D231F;
    --muted: #6C756E;
    --line: #DDE2DC;
    --accent: #2E7A56;
    --accent-soft: #DCEDE3;
    --accent-ink: #1E5A3E;
    --danger: #B4483E;
    --danger-soft: #F6E4E2;
    --on-accent: #FFFFFF;
    --shadow: 0 1px 3px rgba(29, 35, 31, 0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #141814;
      --surface: #1D231E;
      --ink: #E7ECE7;
      --muted: #8B958C;
      --line: #303A31;
      --accent: #5CBB8B;
      --accent-soft: #24382C;
      --accent-ink: #8FD8B3;
      --danger: #D97A70;
      --danger-soft: #3C2624;
      --on-accent: #0E1710;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
    }
  }
  :root[data-theme="light"] {
    --ground: #F6F7F3;
    --surface: #FFFFFF;
    --ink: #1D231F;
    --muted: #6C756E;
    --line: #DDE2DC;
    --accent: #2E7A56;
    --accent-soft: #DCEDE3;
    --accent-ink: #1E5A3E;
    --danger: #B4483E;
    --danger-soft: #F6E4E2;
    --on-accent: #FFFFFF;
    --shadow: 0 1px 3px rgba(29, 35, 31, 0.07);
  }
  :root[data-theme="dark"] {
    --ground: #141814;
    --surface: #1D231E;
    --ink: #E7ECE7;
    --muted: #8B958C;
    --line: #303A31;
    --accent: #5CBB8B;
    --accent-soft: #24382C;
    --accent-ink: #8FD8B3;
    --danger: #D97A70;
    --danger-soft: #3C2624;
    --on-accent: #0E1710;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--ground);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    line-height: 1.6;
    padding: max(20px, env(safe-area-inset-top)) 16px max(48px, env(safe-area-inset-bottom));
    -webkit-text-size-adjust: 100%;
  }

  .app { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

  header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 4px 4px 0; }
  h1 { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: 0.02em; }
  .subtitle { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }

  button {
    font: inherit;
    color: inherit;
    background: none;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .btn {
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--line);
    background: var(--surface);
  }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  .btn-danger { color: var(--danger); border-color: var(--line); }
  .btn-ghost { color: var(--muted); font-weight: 500; }

  /* ---- 追加フォーム ---- */
  .add-panel {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow);
    display: none;
    flex-direction: column;
    gap: 14px;
  }
  .add-panel.open { display: flex; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; }
  input[type="text"], input[type="date"], input[type="time"] {
    font: inherit;
    font-size: 15px;
    color: var(--ink);
    background: var(--ground);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 12px;
    width: 100%;
    -webkit-appearance: none;
  }
  input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  .datetime-row { display: flex; gap: 8px; }
  .datetime-row .field { flex: 1; }

  .emoji-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .emoji-choice {
    font-size: 20px;
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--ground);
  }
  .emoji-choice[aria-pressed="true"] { border-color: var(--accent); background: var(--accent-soft); }

  .add-actions { display: flex; justify-content: flex-end; gap: 8px; }

  /* ---- タイマーカード ---- */
  .cards { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 16px 14px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card-head { display: flex; align-items: center; gap: 10px; }
  .card-emoji { font-size: 26px; line-height: 1; }
  .card-title { font-size: 16px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-since { font-size: 11px; color: var(--muted); white-space: nowrap; }

  .counter { display: flex; align-items: baseline; gap: 10px; font-variant-numeric: tabular-nums; }
  .counter .days { font-size: 44px; font-weight: 300; letter-spacing: -0.01em; line-height: 1.1; color: var(--accent-ink); }
  .counter .days b { font-size: 18px; font-weight: 600; margin-left: 2px; }
  .counter .hms { font-size: 16px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; }
  .counter.paused .hms { color: var(--danger); }
  .paused-label { font-size: 11px; color: var(--danger); font-weight: 600; letter-spacing: 0.05em; margin-top: 2px; }

  .card-meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; }
  .card-meta strong { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }

  .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border-top: 1px solid var(--line); padding-top: 10px; }
  .card-actions .spacer { display: none; }
  .card-actions .btn { padding: 10px; font-size: 13px; min-height: 44px; }

  /* ---- カレンダー ---- */
  .cal { display: none; flex-direction: column; gap: 8px; border-top: 1px solid var(--line); padding-top: 12px; }
  .cal.open { display: flex; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; }
  .cal-nav .month-label { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .cal-nav button { padding: 4px 12px; font-size: 14px; color: var(--muted); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { font-size: 10px; color: var(--muted); text-align: center; padding: 2px 0; letter-spacing: 0.05em; }
  .cal-day {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    border-radius: 8px;
    color: var(--ink);
  }
  .cal-day.blank { visibility: hidden; }
  .cal-day.done { background: var(--accent-soft); color: var(--accent-ink); font-weight: 600; }
  .cal-day.today { box-shadow: inset 0 0 0 1.5px var(--accent); }
  .cal-day.future { color: var(--muted); opacity: 0.45; }

  /* ---- 確認モーダル ---- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .overlay[hidden] { display: none; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    max-width: 420px;
    width: 100%;
    display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
  }
  .modal-msg { margin: 0; font-size: 14px; white-space: pre-line; }
  .modal textarea {
    font: inherit; font-size: 13px;
    color: var(--ink);
    background: var(--ground);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    min-height: 90px;
    width: 100%;
    resize: vertical;
  }
  .modal textarea:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .modal-actions .btn { min-height: 44px; padding: 10px 18px; }
  .btn-danger-solid { background: var(--danger); border-color: var(--danger); color: #fff; }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 48px 16px;
    border: 1px dashed var(--line);
    border-radius: 14px;
  }

  footer { display: flex; justify-content: center; gap: 16px; padding-top: 8px; }
  footer button { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; padding: 6px 8px; }

  @media (prefers-reduced-motion: no-preference) {
    .card { transition: box-shadow 0.15s ease; }
    .add-panel.open { animation: rise 0.18s ease; }
    @keyframes rise { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div>
      <h1>禁欲タイマー</h1>
      <div class="subtitle">やめていることの継続記録</div>
    </div>
    <button class="btn btn-primary" id="toggleAdd">＋ 追加</button>
  </header>

  <section class="add-panel" id="addPanel" aria-label="新しい禁止項目を追加">
    <div class="field">
      <span class="field-label">なにをやめる?</span>
      <div class="emoji-row" id="emojiRow"></div>
    </div>
    <div class="field">
      <span class="field-label">名前</span>
      <input type="text" id="nameInput" placeholder="例: お酒" maxlength="20" autocomplete="off">
    </div>
    <div class="datetime-row">
      <div class="field">
        <span class="field-label">開始日</span>
        <input type="date" id="dateInput">
      </div>
      <div class="field">
        <span class="field-label">開始時刻</span>
        <input type="time" id="timeInput">
      </div>
    </div>
    <div class="add-actions">
      <button class="btn btn-ghost" id="cancelAdd">キャンセル</button>
      <button class="btn btn-primary" id="saveAdd">開始する</button>
    </div>
  </section>

  <main class="cards" id="cards"></main>

  <footer>
    <button id="exportBtn">データを書き出す</button>
    <button id="importBtn">データを読み込む</button>
  </footer>
</div>

<div class="overlay" id="overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalMsg">
    <p class="modal-msg" id="modalMsg"></p>
    <textarea id="modalText" hidden aria-label="データ"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">キャンセル</button>
      <button class="btn btn-primary" id="modalOk">OK</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var STORAGE_KEY = 'kinyoku-timers-v1';
  var EMOJIS = ['🍺', '🚬', '🍰', '☕', '🎮', '📱', '💸', '🎰', '🍜', '🛑'];
  var DOW = ['日', '月', '火', '水', '木', '金', '土'];

  var items = load();
  var openCalendars = {}; // id -> {year, month}
  var selectedEmoji = EMOJIS[0];

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      var data = raw ? JSON.parse(raw) : [];
      return Array.isArray(data) ? data : [];
    } catch (e) { return []; }
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch (e) {}
  }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function fmtDate(ts) {
    var d = new Date(ts);
    return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
  }

  function daysLen(ms) { return Math.floor(ms / 86400000); }

  function bestStreak(item) {
    var best = Date.now() - item.start;
    (item.history || []).forEach(function (p) {
      if (p.end - p.start > best) best = p.end - p.start;
    });
    return best;
  }

  function totalDoneDays(item) {
    // 現在+過去の全期間の合計日数(概算)
    var total = Date.now() - item.start;
    (item.history || []).forEach(function (p) { total += p.end - p.start; });
    return daysLen(total);
  }

  // その日(ローカル)がいずれかの期間と重なるか
  function dayCovered(item, y, m, d) {
    var dayStart = new Date(y, m, d).getTime();
    var dayEnd = new Date(y, m, d + 1).getTime();
    var now = Date.now();
    if (item.start < dayEnd && now > dayStart) return true;
    var hist = item.history || [];
    for (var i = 0; i < hist.length; i++) {
      if (hist[i].start < dayEnd && hist[i].end > dayStart) return true;
    }
    return false;
  }

  // ---------- 描画 ----------
  var cardsEl = document.getElementById('cards');

  function render() {
    cardsEl.innerHTML = '';
    if (items.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = 'まだ何も禁止していません。「＋ 追加」から始めましょう。';
      cardsEl.appendChild(empty);
      return;
    }
    items.forEach(function (item) {
      cardsEl.appendChild(buildCard(item));
    });
    tick();
  }

  function buildCard(item) {
    var card = document.createElement('article');
    card.className = 'card';
    card.dataset.id = item.id;

    var head = document.createElement('div');
    head.className = 'card-head';
    var emoji = document.createElement('span');
    emoji.className = 'card-emoji';
    emoji.textContent = item.emoji;
    var title = document.createElement('h2');
    title.className = 'card-title';
    title.textContent = item.name;
    title.style.margin = '0';
    var since = document.createElement('span');
    since.className = 'card-since';
    since.textContent = fmtDate(item.start) + ' から';
    head.appendChild(emoji); head.appendChild(title); head.appendChild(since);

    var counter = document.createElement('div');
    counter.className = 'counter';
    if (item.paused) counter.classList.add('paused');
    counter.innerHTML = '<span class="days"><span class="d-num">0</span><b>日</b></span><span class="hms">00:00:00</span>';

    var pausedLabel = document.createElement('div');
    pausedLabel.className = 'paused-label';
    pausedLabel.textContent = '⏸ 一時停止中';
    pausedLabel.style.display = item.paused ? 'block' : 'none';

    var meta = document.createElement('div');
    meta.className = 'card-meta';
    var resets = (item.history || []).length;
    meta.innerHTML =
      '<span>最長記録 <strong class="m-best">–</strong></span>' +
      '<span>合計 <strong class="m-total">–</strong></span>' +
      (resets ? '<span>リセット <strong>' + resets + '回</strong></span>' : '');

    var actions = document.createElement('div');
    actions.className = 'card-actions';
    var calBtn = document.createElement('button');
    calBtn.className = 'btn btn-ghost';
    calBtn.textContent = openCalendars[item.id] ? '📅 閉じる' : '📅 カレンダー';
    calBtn.addEventListener('click', function () { toggleCal(item.id); });
    var pauseBtn = document.createElement('button');
    pauseBtn.className = 'btn btn-ghost';
    pauseBtn.textContent = item.paused ? '▶ 再開' : '⏸ 一時停止';
    pauseBtn.addEventListener('click', function () { togglePause(item.id); });
    var resetBtn = document.createElement('button');
    resetBtn.className = 'btn btn-danger';
    resetBtn.textContent = 'リセット';
    resetBtn.addEventListener('click', function () { resetItem(item.id); });
    var delBtn = document.createElement('button');
    delBtn.className = 'btn btn-ghost';
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', function () { deleteItem(item.id); });
    actions.appendChild(calBtn); actions.appendChild(pauseBtn);
    actions.appendChild(resetBtn); actions.appendChild(delBtn);

    var cal = document.createElement('div');
    cal.className = 'cal' + (openCalendars[item.id] ? ' open' : '');
    if (openCalendars[item.id]) buildCalendar(cal, item);

    card.appendChild(head);
    card.appendChild(counter);
    card.appendChild(pausedLabel);
    card.appendChild(meta);
    card.appendChild(actions);
    card.appendChild(cal);
    return card;
  }

  function buildCalendar(container, item) {
    container.innerHTML = '';
    var st = openCalendars[item.id];
    var y = st.year, m = st.month;

    var nav = document.createElement('div');
    nav.className = 'cal-nav';
    var prev = document.createElement('button');
    prev.textContent = '‹';
    prev.setAttribute('aria-label', '前の月');
    prev.addEventListener('click', function () {
      st.month--; if (st.month < 0) { st.month = 11; st.year--; }
      buildCalendar(container, item);
    });
    var label = document.createElement('span');
    label.className = 'month-label';
    label.textContent = y + '年 ' + (m + 1) + '月';
    var next = document.createElement('button');
    next.textContent = '›';
    next.setAttribute('aria-label', '次の月');
    next.addEventListener('click', function () {
      st.month++; if (st.month > 11) { st.month = 0; st.year++; }
      buildCalendar(container, item);
    });
    nav.appendChild(prev); nav.appendChild(label); nav.appendChild(next);

    var grid = document.createElement('div');
    grid.className = 'cal-grid';
    DOW.forEach(function (w) {
      var c = document.createElement('div');
      c.className = 'cal-dow';
      c.textContent = w;
      grid.appendChild(c);
    });

    var firstDow = new Date(y, m, 1).getDay();
    var numDays = new Date(y, m + 1, 0).getDate();
    var today = new Date();
    var isThisMonth = today.getFullYear() === y && today.getMonth() === m;
    var todayTs = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();

    for (var i = 0; i < firstDow; i++) {
      var blank = document.createElement('div');
      blank.className = 'cal-day blank';
      grid.appendChild(blank);
    }
    for (var d = 1; d <= numDays; d++) {
      var cell = document.createElement('div');
      cell.className = 'cal-day';
      cell.textContent = d;
      var cellTs = new Date(y, m, d).getTime();
      if (cellTs > todayTs) {
        cell.className += ' future';
      } else if (dayCovered(item, y, m, d)) {
        cell.className += ' done';
      }
      if (isThisMonth && d === today.getDate()) cell.className += ' today';
      grid.appendChild(cell);
    }

    container.appendChild(nav);
    container.appendChild(grid);
  }

  function toggleCal(id) {
    if (openCalendars[id]) {
      delete openCalendars[id];
    } else {
      var now = new Date();
      openCalendars[id] = { year: now.getFullYear(), month: now.getMonth() };
    }
    render();
  }

  function togglePause(id) {
    var item = items.filter(function (x) { return x.id === id; })[0];
    if (!item) return;
    if (item.paused) {
      // 再開: 一時停止中だった時間を計算して start を調整
      var pausedDuration = Date.now() - item.pausedAt;
      item.start += pausedDuration;
      item.paused = false;
      item.pausedAt = null;
    } else {
      // 一時停止: 現在時刻を記録
      item.paused = true;
      item.pausedAt = Date.now();
    }
    save();
    render();
  }

  // ---------- 毎秒更新 ----------
  function tick() {
    var now = Date.now();
    var cards = cardsEl.querySelectorAll('.card');
    for (var i = 0; i < cards.length; i++) {
      var id = cards[i].dataset.id;
      var item = null;
      for (var j = 0; j < items.length; j++) {
        if (items[j].id === id) { item = items[j]; break; }
      }
      if (!item) continue;
      var elapsed;
      if (item.paused) {
        elapsed = Math.max(0, item.pausedAt - item.start);
      } else {
        elapsed = Math.max(0, now - item.start);
      }
      var days = daysLen(elapsed);
      var rest = elapsed - days * 86400000;
      var h = Math.floor(rest / 3600000);
      var mi = Math.floor((rest % 3600000) / 60000);
      var s = Math.floor((rest % 60000) / 1000);
      cards[i].querySelector('.d-num').textContent = days;
      cards[i].querySelector('.hms').textContent = pad(h) + ':' + pad(mi) + ':' + pad(s);
      var bestEl = cards[i].querySelector('.m-best');
      var totalEl = cards[i].querySelector('.m-total');
      if (bestEl) bestEl.textContent = daysLen(bestStreak(item)) + '日';
      if (totalEl) totalEl.textContent = totalDoneDays(item) + '日';
    }
  }
  setInterval(tick, 1000);

  // ---------- モーダル(confirm/promptの代わり。サンドボックス内でも動く) ----------
  var overlay = document.getElementById('overlay');
  var modalMsg = document.getElementById('modalMsg');
  var modalText = document.getElementById('modalText');
  var modalOk = document.getElementById('modalOk');
  var modalCancel = document.getElementById('modalCancel');
  var modalResolve = null;

  function showModal(opts) {
    return new Promise(function (resolve) {
      modalResolve = resolve;
      modalMsg.textContent = opts.message || '';
      if (opts.text !== undefined) {
        modalText.hidden = false;
        modalText.value = opts.text;
        modalText.readOnly = !!opts.readOnly;
      } else {
        modalText.hidden = true;
        modalText.value = '';
      }
      modalOk.textContent = opts.okLabel || 'OK';
      modalOk.className = 'btn ' + (opts.danger ? 'btn-danger-solid' : 'btn-primary');
      modalCancel.hidden = !!opts.hideCancel;
      overlay.hidden = false;
      if (opts.focusText) {
        modalText.focus();
        if (opts.readOnly) modalText.select();
      } else {
        modalOk.focus();
      }
    });
  }
  function closeModal(ok) {
    overlay.hidden = true;
    var r = modalResolve;
    modalResolve = null;
    if (r) r({ ok: ok, text: modalText.value });
  }
  modalOk.addEventListener('click', function () { closeModal(true); });
  modalCancel.addEventListener('click', function () { closeModal(false); });
  overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(false); });

  // ---------- 操作 ----------
  function resetItem(id) {
    var item = items.filter(function (x) { return x.id === id; })[0];
    if (!item) return;
    var end = item.paused ? item.pausedAt : Date.now();
    var days = daysLen(Math.max(0, end - item.start));
    showModal({
      message: '「' + item.name + '」をリセットしますか?\n' + days + '日間の記録はカレンダーに残り、タイマーは今から再スタートします。',
      okLabel: 'リセットする',
      danger: true
    }).then(function (res) {
      if (!res.ok) return;
      var endTs = item.paused ? item.pausedAt : Date.now();
      item.history = item.history || [];
      item.history.push({ start: item.start, end: endTs });
      item.start = Date.now();
      item.paused = false;
      item.pausedAt = null;
      save();
      render();
    });
  }

  function deleteItem(id) {
    var item = items.filter(function (x) { return x.id === id; })[0];
    if (!item) return;
    showModal({
      message: '「' + item.name + '」を記録ごと削除しますか?',
      okLabel: '削除する',
      danger: true
    }).then(function (res) {
      if (!res.ok) return;
      items = items.filter(function (x) { return x.id !== id; });
      delete openCalendars[id];
      save();
      render();
    });
  }

  // ---------- 追加フォーム ----------
  var addPanel = document.getElementById('addPanel');
  var toggleAdd = document.getElementById('toggleAdd');
  var nameInput = document.getElementById('nameInput');
  var dateInput = document.getElementById('dateInput');
  var timeInput = document.getElementById('timeInput');
  var emojiRow = document.getElementById('emojiRow');

  EMOJIS.forEach(function (e) {
    var b = document.createElement('button');
    b.className = 'emoji-choice';
    b.textContent = e;
    b.setAttribute('aria-pressed', e === selectedEmoji ? 'true' : 'false');
    b.addEventListener('click', function () {
      selectedEmoji = e;
      var all = emojiRow.querySelectorAll('.emoji-choice');
      for (var i = 0; i < all.length; i++) {
        all[i].setAttribute('aria-pressed', all[i].textContent === e ? 'true' : 'false');
      }
    });
    emojiRow.appendChild(b);
  });

  function openAddPanel() {
    var now = new Date();
    dateInput.value = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate());
    timeInput.value = pad(now.getHours()) + ':' + pad(now.getMinutes());
    nameInput.value = '';
    addPanel.classList.add('open');
    toggleAdd.textContent = '閉じる';
    nameInput.focus();
  }
  function closeAddPanel() {
    addPanel.classList.remove('open');
    toggleAdd.textContent = '＋ 追加';
  }
  toggleAdd.addEventListener('click', function () {
    if (addPanel.classList.contains('open')) closeAddPanel(); else openAddPanel();
  });
  document.getElementById('cancelAdd').addEventListener('click', closeAddPanel);

  document.getElementById('saveAdd').addEventListener('click', function () {
    var name = nameInput.value.trim();
    if (!name) { nameInput.focus(); return; }
    var start = Date.now();
    if (dateInput.value) {
      var t = timeInput.value || '00:00';
      var parsed = new Date(dateInput.value + 'T' + t + ':00').getTime();
      if (!isNaN(parsed)) start = Math.min(parsed, Date.now());
    }
    items.unshift({
      id: 'i' + Date.now() + Math.random().toString(36).slice(2, 7),
      name: name,
      emoji: selectedEmoji,
      start: start,
      history: []
    });
    save();
    closeAddPanel();
    render();
  });

  // ---------- 書き出し / 読み込み ----------
  document.getElementById('exportBtn').addEventListener('click', function () {
    var json = JSON.stringify(items);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(json).catch(function () {});
    }
    showModal({
      message: 'このテキストをコピーして、別の端末の「データを読み込む」に貼り付けてください。',
      text: json,
      readOnly: true,
      focusText: true,
      okLabel: '閉じる',
      hideCancel: true
    });
  });

  document.getElementById('importBtn').addEventListener('click', function () {
    showModal({
      message: '書き出したデータを下に貼り付けてください。現在のデータは置き換わります。',
      text: '',
      focusText: true,
      okLabel: '読み込む'
    }).then(function (res) {
      if (!res.ok || !res.text.trim()) return;
      try {
        var data = JSON.parse(res.text.trim());
        if (!Array.isArray(data)) throw new Error();
        var valid = data.every(function (x) {
          return x && typeof x.name === 'string' && typeof x.start === 'number';
        });
        if (!valid) throw new Error();
        items = data;
        save();
        render();
      } catch (e) {
        showModal({ message: 'データの形式が正しくありません。', okLabel: '閉じる', hideCancel: true });
      }
    });
  });

  render();
})();
</script>
</body>
</html>
